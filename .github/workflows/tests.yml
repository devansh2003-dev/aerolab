name: tests

# Runs the pytest suite on every push to main and every PR. The full suite
# (186 tests as of 2026-05-24, of which ~44 are solver physics and the
# remainder cover shapes, polygon geometry, custom-shape extraction, force
# calculation, render pipeline, and visual regression) takes ~30 s warm
# cache, ~90 s cold (numba JIT compile dominates the cold-cache delta).
# The validation-benchmark suite runs separately (~8 min) — full Williamson
# + Okajima sweep at n_frames=300, above the documented FFT noise floor.
# One visual-regression test renders a 51-frame canonical-cylinder pipeline
# as a fingerprint check (~10 s of the warm total).
#
# We pin to Python 3.11 because numba 0.65.1 (pinned in requirements.txt)
# doesn't yet wheel for 3.12+ on every platform; bump together when we
# upgrade numba.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install ruff

      # Lint is now blocking. Codebase is ruff-clean (autofix + manual
      # pass on 2026-05-24); flipping continue-on-error: true -> false
      # means any new violation fails CI. Add explicit # noqa if you
      # need to suppress a single line.
      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        run: pytest -q
